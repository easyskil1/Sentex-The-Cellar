<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Procedurális app-ikon (nincs raszteres asset). A favicon nagyobb testvére:
       sötét pince-háttér, sápadt szem-korong, izzó vörös mag, arany keret-fény.
       Maskable-barát: a lényeg a középső ~80%-ban marad. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#2e2536"/>
      <stop offset="100%" stop-color="#160f1c"/>
    </radialGradient>
    <radialGradient id="eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eadff5"/>
      <stop offset="70%" stop-color="#cdbfe0"/>
      <stop offset="100%" stop-color="#8a7ea0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a4a"/>
      <stop offset="55%" stop-color="#d22a1a"/>
      <stop offset="100%" stop-color="#7a1410"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="82" fill="none" stroke="#f0c878" stroke-opacity="0.22" stroke-width="6"/>
  <circle cx="256" cy="256" r="132" fill="url(#eye)"/>
  <circle cx="256" cy="256" r="54" fill="url(#core)"/>
  <circle cx="234" cy="232" r="16" fill="#fff" fill-opacity="0.5"/>
</svg>
